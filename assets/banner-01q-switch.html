<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SignalDeck — Banner 01-Q · Switch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1500px; height: 750px; overflow: hidden; background: #09090b; }
body { position: relative; }
/* Decorative top band */
.band-top { position: absolute; top: 0; left: 0; right: 0; height: 125px; background: linear-gradient(to bottom, rgba(168,85,247,0.12) 0%, rgba(59,130,246,0.04) 55%, transparent 100%); }
/* Bold accent bar along the bottom */
.band-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 123px; background: linear-gradient(105deg, #3b82f6 0%, #6366f1 45%, #a855f7 100%); }
/* The 1500x500 design stage, vertically centered */
.stage { position: absolute; top: 125px; left: 0; width: 1500px; height: 500px; overflow: hidden; }
</style>
</head>
<body>

  <div class="band-top"></div>

  <div class="stage">
    <svg id="svg" width="1500" height="500" style="position:absolute;top:0;left:0;"></svg>

    <div style="position:absolute;inset:0;background:linear-gradient(to right,transparent 0%,transparent 52%,rgba(9,9,11,0.5) 68%,rgba(9,9,11,0.97) 84%);pointer-events:none;"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(9,9,11,0.5) 0%,transparent 20%,transparent 80%,rgba(9,9,11,0.5) 100%);pointer-events:none;"></div>

    <div style="position:absolute;top:50px;right:68px;text-align:right;z-index:10;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#3b82f6;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:14px;">SignalDeck</div>
      <div style="font-size:74px;font-weight:900;letter-spacing:-0.038em;line-height:0.95;color:#fff;margin-bottom:14px;">
        The Edgewonk<br>
        <span style="background:linear-gradient(95deg,#60a5fa 0%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent;">Alternative.</span>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#52525b;letter-spacing:0.05em;margin-bottom:7px;">Free Tier · MT4/MT5 Live Sync · Walk-Forward</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#3f3f46;letter-spacing:0.04em;">Monte Carlo · Live Drawdown · R-Multiple</div>
    </div>

    <div style="position:absolute;bottom:26px;right:68px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#27272a;letter-spacing:0.1em;z-index:10;">sgnldk.com</div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,#3b82f6,#a855f7);"></div>
  </div>

<script>
(function () {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');

  function el(p, t, a) {
    const e = document.createElementNS(NS, t);
    for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
    p.appendChild(e); return e;
  }

  function prng(seed) {
    let s = seed >>> 0;
    return () => {
      s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
      s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
      s ^= s >>> 16;
      return (s >>> 0) / 0xffffffff;
    };
  }

  const rng = prng(19700);
  const N = 200;
  const toX = i => 20 + (i / (N - 1)) * 870;

  /* --- OLD TOOL: a capped, plateauing curve (rose, dashed) that stalls out --- */
  /* rises early then flattens — "one-time feature set, no iteration" */
  const oldY = [];
  for (let i = 0; i < N; i++) {
    const t = i / (N - 1);
    const ramp = 1 - Math.exp(-3.2 * t);           /* fast rise, hard plateau */
    const wobble = (rng() - 0.5) * 0.02;
    oldY.push(120 + (1 - (ramp + wobble)) * 250);   /* higher y = lower on screen */
  }

  /* --- SIGNALDECK: keeps compounding upward past the plateau (blue→purple) --- */
  const newVal = [0];
  for (let i = 1; i < N; i++) {
    const drift = 0.16;
    newVal.push(newVal[i - 1] + (rng() - 0.5 + drift) * 15);
  }
  const minB = Math.min(...newVal), maxB = Math.max(...newVal);
  const rangeB = (maxB - minB) || 1;
  const newY = newVal.map(v => 100 + ((maxB - v) / rangeB) * 300);

  const defs = el(svg, 'defs', {});

  /* Rising-stream fill gradient (blue) */
  const eqg = el(defs, 'linearGradient', { id: 'eqg', x1: '0', y1: '0', x2: '0', y2: '1' });
  el(eqg, 'stop', { offset: '0%', 'stop-color': '#3b82f6', 'stop-opacity': '0.24' });
  el(eqg, 'stop', { offset: '100%', 'stop-color': '#3b82f6', 'stop-opacity': '0.0' });

  /* Purple→blue stroke for the winning line */
  const line = el(defs, 'linearGradient', { id: 'line', x1: '0', y1: '0', x2: '1', y2: '0' });
  el(line, 'stop', { offset: '0%', 'stop-color': '#60a5fa' });
  el(line, 'stop', { offset: '100%', 'stop-color': '#a855f7' });

  /* Glow for the leading pulse */
  const glow = el(defs, 'radialGradient', { id: 'glow', cx: '0.5', cy: '0.5', r: '0.5' });
  el(glow, 'stop', { offset: '0%', 'stop-color': '#2dd4bf', 'stop-opacity': '0.9' });
  el(glow, 'stop', { offset: '100%', 'stop-color': '#2dd4bf', 'stop-opacity': '0.0' });

  /* Faint grid */
  [0.25, 0.5, 0.75].forEach(f => {
    const y = (70 + f * 360).toFixed(1);
    el(svg, 'line', { x1: 0, y1: y, x2: 900, y2: y, stroke: '#27272a', 'stroke-width': 1, 'stroke-dasharray': '4 8', opacity: 0.4 });
  });

  /* --- OLD TOOL line: rose, dashed, plateauing --- */
  let oldD = '';
  oldY.forEach((v, i) => { oldD += (i === 0 ? 'M' : 'L') + toX(i).toFixed(1) + ',' + v.toFixed(1) + ' '; });
  el(svg, 'path', { d: oldD, stroke: '#f43f5e', 'stroke-width': 2, fill: 'none', opacity: 0.55, 'stroke-dasharray': '6 7', 'stroke-linecap': 'round' });
  /* terminal cap marker on the old line */
  const ox = toX(N - 1), oy = oldY[N - 1];
  el(svg, 'circle', { cx: ox, cy: oy, r: 5, fill: '#09090b', stroke: '#f43f5e', 'stroke-width': 2, opacity: 0.8 });

  /* --- SIGNALDECK: continuous stream fill + line that overtakes --- */
  let fill = '';
  newY.forEach((v, i) => { fill += (i === 0 ? 'M' : 'L') + toX(i).toFixed(1) + ',' + v.toFixed(1) + ' '; });
  fill += `L${toX(N-1).toFixed(1)},430 L${toX(0).toFixed(1)},430 Z`;
  el(svg, 'path', { d: fill, fill: 'url(#eqg)', stroke: 'none' });

  let newD = '';
  newY.forEach((v, i) => { newD += (i === 0 ? 'M' : 'L') + toX(i).toFixed(1) + ',' + v.toFixed(1) + ' '; });
  el(svg, 'path', { d: newD, stroke: 'url(#line)', 'stroke-width': 6, fill: 'none', opacity: 0.12, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
  el(svg, 'path', { d: newD, stroke: 'url(#line)', 'stroke-width': 2.6, fill: 'none', opacity: 0.97, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });

  /* Leading pulse — the switch that keeps climbing */
  const lx = toX(N - 1), ly = newY[N - 1];
  el(svg, 'circle', { cx: lx, cy: ly, r: 26, fill: 'url(#glow)' });
  el(svg, 'circle', { cx: lx, cy: ly, r: 5.5, fill: '#2dd4bf' });
  el(svg, 'circle', { cx: lx, cy: ly, r: 5.5, fill: 'none', stroke: '#2dd4bf', 'stroke-width': 1.5, opacity: 0.5 });
})();
</script>
</body>
</html>
