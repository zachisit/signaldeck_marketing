<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SignalDeck — Banner 01-P · Live Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1500px; height: 750px; overflow: hidden; background: #09090b; }
body { position: relative; }
/* Decorative top band */
.band-top { position: absolute; top: 0; left: 0; right: 0; height: 125px; background: linear-gradient(to bottom, rgba(168,85,247,0.12) 0%, rgba(59,130,246,0.04) 55%, transparent 100%); }
/* Bold accent bar along the bottom */
.band-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 123px; background: linear-gradient(105deg, #3b82f6 0%, #6366f1 45%, #a855f7 100%); }
/* The 1500x500 design stage, vertically centered */
.stage { position: absolute; top: 125px; left: 0; width: 1500px; height: 500px; overflow: hidden; }
</style>
</head>
<body>

  <div class="band-top"></div>

  <div class="stage">
    <svg id="svg" width="1500" height="500" style="position:absolute;top:0;left:0;"></svg>

    <div style="position:absolute;inset:0;background:linear-gradient(to right,transparent 0%,transparent 52%,rgba(9,9,11,0.5) 68%,rgba(9,9,11,0.97) 84%);pointer-events:none;"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(9,9,11,0.5) 0%,transparent 20%,transparent 80%,rgba(9,9,11,0.5) 100%);pointer-events:none;"></div>

    <div style="position:absolute;top:54px;right:68px;text-align:right;z-index:10;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#3b82f6;letter-spacing:0.22em;text-transform:uppercase;margin-bottom:14px;">SignalDeck</div>
      <div style="font-size:74px;font-weight:900;letter-spacing:-0.038em;line-height:0.95;color:#fff;margin-bottom:14px;">
        Live<br>
        <span style="background:linear-gradient(95deg,#60a5fa 0%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;color:transparent;">MT5 Sync.</span>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#52525b;letter-spacing:0.05em;margin-bottom:7px;">MetaApi Session · Open Positions · Live Balance</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#3f3f46;letter-spacing:0.04em;">Not EA Import · Real-Time Drawdown · R-Multiple</div>
    </div>

    <div style="position:absolute;bottom:26px;right:68px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#27272a;letter-spacing:0.1em;z-index:10;">sgnldk.com</div>
    <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,#3b82f6,#a855f7);"></div>
  </div>

<script>
(function () {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('svg');

  function el(p, t, a) {
    const e = document.createElementNS(NS, t);
    for (const [k, v] of Object.entries(a)) e.setAttribute(k, v);
    p.appendChild(e); return e;
  }

  function prng(seed) {
    let s = seed >>> 0;
    return () => {
      s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
      s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
      s ^= s >>> 16;
      return (s >>> 0) / 0xffffffff;
    };
  }

  const rng = prng(90125);
  const N = 200;
  /* A live tick stream: continuous, real-time balance line */
  const bal = [0];
  for (let i = 1; i < N; i++) {
    const drift = 0.12;
    bal.push(bal[i - 1] + (rng() - 0.5 + drift) * 16);
  }
  const minB = Math.min(...bal), maxB = Math.max(...bal);
  const rangeB = (maxB - minB) || 1;
  const toX = i => 20 + (i / (N - 1)) * 870;
  const toY = v => 70 + ((maxB - v) / rangeB) * 360;

  const defs = el(svg, 'defs', {});

  /* Live stream fill gradient (blue) */
  const eqg = el(defs, 'linearGradient', { id: 'eqg', x1: '0', y1: '0', x2: '0', y2: '1' });
  el(eqg, 'stop', { offset: '0%', 'stop-color': '#3b82f6', 'stop-opacity': '0.26' });
  el(eqg, 'stop', { offset: '100%', 'stop-color': '#3b82f6', 'stop-opacity': '0.0' });

  /* Glow for the live pulse */
  const glow = el(defs, 'radialGradient', { id: 'glow', cx: '0.5', cy: '0.5', r: '0.5' });
  el(glow, 'stop', { offset: '0%', 'stop-color': '#2dd4bf', 'stop-opacity': '0.9' });
  el(glow, 'stop', { offset: '100%', 'stop-color': '#2dd4bf', 'stop-opacity': '0.0' });

  /* Faint grid */
  [0.25, 0.5, 0.75].forEach(f => {
    const y = (70 + f * 360).toFixed(1);
    el(svg, 'line', { x1: 0, y1: y, x2: 900, y2: y, stroke: '#27272a', 'stroke-width': 1, 'stroke-dasharray': '4 8', opacity: 0.4 });
  });

  /* --- EA IMPORT: sparse, stale snapshots (rose, discrete) --- */
  /* Only a handful of points, sampled far apart — "closed trades only, no live state" */
  const eaIdx = [];
  for (let i = 12; i < N - 8; i += 26) eaIdx.push(i);
  eaIdx.forEach(i => {
    const x = toX(i).toFixed(1), y = toY(bal[i]).toFixed(1);
    /* dashed drop line to baseline */
    el(svg, 'line', { x1: x, y1: y, x2: x, y2: 430, stroke: '#f43f5e', 'stroke-width': 1, 'stroke-dasharray': '3 6', opacity: 0.35 });
    /* hollow snapshot marker */
    el(svg, 'circle', { cx: x, cy: y, r: 5, fill: '#09090b', stroke: '#f43f5e', 'stroke-width': 2, opacity: 0.85 });
  });

  /* --- LIVE SYNC: continuous stream fill + line --- */
  let eqFill = '';
  bal.forEach((v, i) => { eqFill += (i === 0 ? 'M' : 'L') + toX(i).toFixed(1) + ',' + toY(v).toFixed(1) + ' '; });
  eqFill += `L${toX(N-1).toFixed(1)},430 L${toX(0).toFixed(1)},430 Z`;
  el(svg, 'path', { d: eqFill, fill: 'url(#eqg)', stroke: 'none' });

  let eqD = '';
  bal.forEach((v, i) => { eqD += (i === 0 ? 'M' : 'L') + toX(i).toFixed(1) + ',' + toY(v).toFixed(1) + ' '; });
  el(svg, 'path', { d: eqD, stroke: '#3b82f6', 'stroke-width': 6, fill: 'none', opacity: 0.1, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
  el(svg, 'path', { d: eqD, stroke: '#60a5fa', 'stroke-width': 2.5, fill: 'none', opacity: 0.95, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });

  /* Leading live pulse — the "now" tick of a persistent session */
  const lx = toX(N - 1), ly = toY(bal[N - 1]);
  el(svg, 'circle', { cx: lx, cy: ly, r: 26, fill: 'url(#glow)' });
  el(svg, 'circle', { cx: lx, cy: ly, r: 5.5, fill: '#2dd4bf' });
  el(svg, 'circle', { cx: lx, cy: ly, r: 5.5, fill: 'none', stroke: '#2dd4bf', 'stroke-width': 1.5, opacity: 0.5 });
})();
</script>
</body>
</html>
