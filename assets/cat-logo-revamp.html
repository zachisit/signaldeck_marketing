/* Full palette revamp:
   - Orange pixels  → dark navy-blue, brightness preserved for texture
   - Dark pixels    → brand blue #3b82f6
   - Mid/transition → blended toward slate
*/
function revamp(ctx, sz, eyeR, eyeG, eyeB, noseCol) {
  var id = ctx.getImageData(0, 0, sz, sz);
  var d = id.data;
  for (var i = 0; i < d.length; i += 4) {
    var r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
    if (a < 20) continue;
    var lum = 0.299*r + 0.587*g + 0.114*b;
    var isOrange = r > 140 && (r - b) > 70 && (r - g) > 20 && r > g && r > b;
    if (isOrange) {
      /* Map orange → dark navy preserving per-pixel brightness for fur texture */
      var t = Math.max(0, Math.min(1, (lum - 80) / 160));
      d[i]   = Math.round(12 + t * 46);   /* #0c → #3b */
      d[i+1] = Math.round(20 + t * 74);   /* #14 → #5a */
      d[i+2] = Math.round(48 + t * 110);  /* #30 → #a0 */
    } else {
      /* Dark pixels (eyes, outlines, nose shadow) → brand blue */
      d[i] = eyeR; d[i+1] = eyeG; d[i+2] = eyeB;
    }
  }
  ctx.putImageData(id, 0, 0);
}

function revampPurple(ctx, sz) { revamp(ctx, sz, 168, 85, 247); }
function revampBlue(ctx, sz)   { revamp(ctx, sz, 59, 130, 246); }
function revampTeal(ctx, sz)   { revamp(ctx, sz, 20, 184, 166); }
function revampAmber(ctx, sz)  { revamp(ctx, sz, 251, 191, 36); }

  {label:'BRAND BLUE',   desc:'Navy body with brand-blue #3b82f6 eye/outline pixels. Core revamp.',         bg:'#09090b', fn:revampBlue,   glow:'drop-shadow(0 0 8px rgba(59,130,246,0.9)) drop-shadow(0 0 22px rgba(59,130,246,0.5)) drop-shadow(0 0 44px rgba(168,85,247,0.3))'},
  {label:'PURPLE',       desc:'Same navy body, purple #a855f7 accents — gradient endpoint variant.',         bg:'#09090b', fn:revampPurple, glow:'drop-shadow(0 0 8px rgba(168,85,247,0.9)) drop-shadow(0 0 22px rgba(168,85,247,0.5))'},
  {label:'TEAL',         desc:'Navy body with teal #14b8a6 accents — high contrast on dark.',                bg:'#09090b', fn:revampTeal,   glow:'drop-shadow(0 0 8px rgba(20,184,166,0.9)) drop-shadow(0 0 22px rgba(20,184,166,0.5))'},
  {label:'BLUE · NO GLOW', desc:'Brand blue accents, no CSS glow — clean flat icon.',                        bg:'#09090b', fn:revampBlue,   glow:''},

  {label:'AMBER',        desc:'Navy body, warm amber #fbbf24 accents — retains warmth of the original.',    bg:'#09090b', fn:revampAmber,  glow:'drop-shadow(0 0 8px rgba(251,191,36,0.8)) drop-shadow(0 0 22px rgba(251,191,36,0.4))'},
];

function makeCanvas(sz, v, srcImg) {
  var c = document.createElement('canvas');
  c.width = c.height = sz;
  var ctx = c.getContext('2d');
  ctx.drawImage(srcImg, 0, 0, sz, sz);
  v.fn(ctx, sz);
  if (v.glow) c.style.filter = v.glow;
  return c;
}

function render(srcImg) {
  var grid = document.getElementById('grid');
  VARIANTS.forEach(function(v) {
    var card = document.createElement('div');
    card.innerHTML =
      '<div class="card-label">' + v.label + '</div>' +
      '<div class="card-desc">' + v.desc + '</div>' +
      '<div class="card-row">' +
        '<div class="icon-lg" style="background:' + v.bg + ';"></div>' +
        '<div class="sm-stack">' +
          '<div class="sm-item"><div class="icon-sm-dk" style="background:' + v.bg + ';"></div><div class="sm-lbl">dark</div></div>' +
          '<div class="sm-item"><div class="icon-sm-lt"></div><div class="sm-lbl">light</div></div>' +
        '</div>' +
      '</div>';
    card.querySelector('.icon-lg').appendChild(makeCanvas(160, v, srcImg));
    card.querySelector('.icon-sm-dk').appendChild(makeCanvas(50, v, srcImg));
    card.querySelector('.icon-sm-lt').appendChild(makeCanvas(50, v, srcImg));
    grid.appendChild(card);
  });
}

var srcImg = new Image();
srcImg.onload = function() { render(srcImg); };
srcImg.src = SRC;
</script>
