canvas, img { display: block; }

function editEyes(r2,g2,b2){return(ctx,sz)=>{const id=ctx.getImageData(0,0,sz,sz);const d=id.data;for(let y=0;y<sz;y++){for(let x=0;x<sz;x++){const i=(y*sz+x)*4;if(d[i+3]<20)continue;const rx=x/sz,ry=y/sz;if(rx>0.12&&rx<0.88&&ry>0.20&&ry<0.55&&d[i]<110&&d[i+1]<110&&d[i+2]<110){d[i]=r2;d[i+1]=g2;d[i+2]=b2;}}}ctx.putImageData(id,0,0);};}
function editCoolGrade(ctx,sz){const id=ctx.getImageData(0,0,sz,sz);const d=id.data;for(let i=0;i<d.length;i+=4){if(d[i+3]<20)continue;const br=(d[i]+d[i+1]+d[i+2])/3;const t=Math.max(0,1-br/120);d[i]=Math.round(d[i]*(1-t)+59*t);d[i+1]=Math.round(d[i+1]*(1-t)+130*t);d[i+2]=Math.round(d[i+2]*(1-t)+246*t);}ctx.putImageData(id,0,0);}

  {label:'ORIGINAL',desc:'No changes. Original PNG on brand dark background.',bg:'#09090b',edit:null,cssFilter:'',ring:false},

];
function buildCanvas(srcImg,sz,v){const wrap=document.createElement('div');wrap.style.cssText='position:relative;width:'+sz+'px;height:'+sz+'px;flex-shrink:0;';if(v.ring){const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');const uid='rg'+Math.random().toString(36).slice(2,7);svg.setAttribute('width',sz);svg.setAttribute('height',sz);svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;';svg.innerHTML='<defs><linearGradient id="'+uid+'" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+(sz/2-2)+'" fill="none" stroke="url(#'+uid+')" stroke-width="'+Math.max(2,sz/55)+'"/>';wrap.appendChild(svg);}const pad=v.ring?Math.round(sz*0.05):0;const imgSz=sz-pad*2;if(!v.edit){const el=document.createElement('img');el.src=srcImg.src;el.width=imgSz;el.height=imgSz;el.style.cssText='position:absolute;top:'+pad+'px;left:'+pad+'px;';if(v.cssFilter)el.style.filter=v.cssFilter;wrap.appendChild(el);return wrap;}const c=document.createElement('canvas');c.width=c.height=imgSz;c.style.cssText='position:absolute;top:'+pad+'px;left:'+pad+'px;';const ctx=c.getContext('2d');ctx.drawImage(srcImg,0,0,imgSz,imgSz);v.edit(ctx,imgSz);wrap.appendChild(c);return wrap;}
function render(srcImg){const grid=document.getElementById('grid');grid.innerHTML='';VARIANTS.forEach(v=>{const card=document.createElement('div');card.innerHTML='<div class="card-label">'+v.label+'</div><div class="card-desc">'+v.desc+'</div><div class="card-row"><div class="icon-lg" style="background:'+v.bg+';"></div><div class="sm-stack"><div class="sm-item"><div class="icon-sm-dk" style="background:'+v.bg+';"></div><div class="sm-lbl">dark</div></div><div class="sm-item"><div class="icon-sm-lt"></div><div class="sm-lbl">light</div></div></div></div>';card.querySelector('.icon-lg').appendChild(buildCanvas(srcImg,160,v));card.querySelector('.icon-sm-dk').appendChild(buildCanvas(srcImg,50,v));card.querySelector('.icon-sm-lt').appendChild(buildCanvas(srcImg,50,v));grid.appendChild(card);});}
const srcImg=new Image();srcImg.onload=()=>render(srcImg);srcImg.src=SRC;
